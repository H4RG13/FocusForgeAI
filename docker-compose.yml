version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: focusforge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: focusforge
      POSTGRES_USER: focusforge
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focusforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: focusforge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: focusforge_mail
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pg_data:
  redis_data:
